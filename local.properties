# Android SDK location
# Cambia esta ruta por la ubicación de tu Android SDK
sdk.dir=/home/user/Android/Sdk

# Si tienes Android Studio instalado, la ruta típica es:
# En Linux: /home/usuario/Android/Sdk
# En Windows: C:/Users/usuario/AppData/Local/Android/Sdk
# En macOS: /Users/usuario/Library/Android/sdk